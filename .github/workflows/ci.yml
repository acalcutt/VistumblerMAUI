name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore workloads
        run: dotnet workload restore VistumblerMAUI.sln

      - name: Build (${{ matrix.rid }})
        # No separate `dotnet restore` step: a generic RID-less restore doesn't pull
        # the runtime pack this RID-aware build needs (NETSDK1112); let the build
        # restore in one shot. -p:UseMonoRuntime=false: this multi-target MAUI csproj
        # otherwise resolves a Mono runtime pack
        # (Microsoft.NETCore.App.Runtime.Mono.${{ matrix.rid }}) for the Windows head,
        # which doesn't exist (NU1101) — force the CoreCLR pack so an explicit RID
        # (required to cross-build win-arm64 on an x64 runner) resolves.
        run: |
          dotnet build VistumblerMAUI/VistumblerMAUI.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -r ${{ matrix.rid }} `
            -p:WindowsPackageType=None `
            -p:UseMonoRuntime=false

  build-android:
    name: Build Android
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore workloads
        run: dotnet workload restore VistumblerMAUI.sln

      - name: Build (net10.0-android36.0)
        # No separate restore step, for the same reason as the Windows job above.
        run: |
          dotnet build VistumblerMAUI/VistumblerMAUI.csproj `
            -f net10.0-android36.0 `
            -c Release

  build-ios:
    name: Build iOS (simulator)
    # Matches the runner maplibre-maui-ac uses to build its own .NET MAUI
    # sample app against this same MapLibreNative.Maui package — the default
    # Xcode on older runner images is too old for the .NET 10 iOS workload.
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore workloads
        run: dotnet workload restore VistumblerMAUI.sln

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Build (net10.0-ios, simulator — no code signing required)
        # No separate restore step here: this build specifies an explicit
        # RuntimeIdentifier, so let it do its own RID-aware implicit restore
        # rather than relying on a prior RID-less `dotnet restore`.
        # -p:EnableWindowsTargeting=true: the csproj also targets
        # net10.0-windows10.0.19041.0, and restore evaluates all
        # TargetFrameworks even when -f picks just one — without this,
        # restoring the Windows TFM on macOS fails with NETSDK1100.
        run: |
          dotnet build VistumblerMAUI/VistumblerMAUI.csproj \
            -f net10.0-ios \
            -c Release \
            -p:EnableWindowsTargeting=true \
            -p:RuntimeIdentifier=iossimulator-arm64
